<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Been Tracker - World Map</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="app-shell map-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Travel Log</p>
          <h1>World Map</h1>
        </div>
        <div class="topbar-actions">
          <a class="ghost-btn" href="list.html">List</a>
          <button id="clearVisited" class="ghost-btn" type="button">
            Clear
          </button>
        </div>
      </header>

      <section class="stats-card" aria-label="Travel stats">
        <div class="stat">
          <p class="stat-label">Visited</p>
          <p class="stat-value" id="visitedCount">0</p>
        </div>
        <div class="stat">
          <p class="stat-label">Countries</p>
          <p class="stat-value" id="countryCount">0</p>
        </div>
        <div class="progress-wrap">
          <p class="stat-label">World Progress</p>
          <div
            class="progress-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            id="progressBar"
          >
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">0%</p>
        </div>
      </section>

      <section class="map-card">
        <div class="map-toolbar">
          <p class="map-help">
            Drag to move, zoom with +/-, and tap a country to mark visited.
          </p>
          <div class="zoom-controls">
            <button
              id="zoomOut"
              class="zoom-btn"
              type="button"
              aria-label="Zoom out"
            >
              &#8722;
            </button>
            <span id="zoomLabel" class="zoom-label">World</span>
            <button
              id="zoomIn"
              class="zoom-btn"
              type="button"
              aria-label="Zoom in"
            >
              &#43;
            </button>
          </div>
        </div>
        <div
          id="worldMap"
          class="world-map"
          aria-label="Interactive world map"
        ></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="countries.js"></script>
    <script src="map.js"></script>
  </body>
</html>
